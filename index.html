<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo "Caballero" - Huella Digital</title>
  <script src="jquery-3.6.0.min.js"></script>
  <script src="turn.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #catalog-container {
      display: flex;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    #sidebar {
    width: 200px;
    padding: 10px;
    background: #e0e0e0;
    border-radius: 6px;
    flex-shrink: 0;
    position: relative;
    transition: all 0.4s ease;
    z-index: 10;
  }
  #sidebar.collapsed {
    width: 0;
    padding: 0;
    opacity: 0;
    overflow: hidden;
  }

  /* Botón independiente */
  #toggle-sidebar {
    position: absolute;
    top: 1px;
    left: 0; /* al borde izquierdo del contenedor */
    width: 25px;
    height: 25px;
    background: #333;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    z-index: 20; /* siempre encima de todo */
  }
    #sidebar h2 {
      font-size: 18px;
      margin-bottom: 10px;
      cursor: default;
      user-select: none;
    }
    #category-list {
      display: block;
      margin-top: 5px;
    }
    #category-list button {
      width: 100%;
      margin: 5px 0;
      font-size: 16px;
    }
    #flipbook {
      width: 900px;
      height: 600px;
      margin: 20px auto;
    }
    #flipbook .page {
      width: 100%;
      height: 100%;
    }
    #flipbook .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: zoom-in;
    }
    .controls {
      margin: 10px;
      display: flex;
      justify-content: center;
      gap: 15px;
      align-items: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
      font-size: 16px;
    }
    button:hover {
      background: #555;
    }
    .page-info {
      font-size: 16px;
      margin-left: 10px;
    }
    input.page-input {
      width: 60px;
      padding: 5px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .contact {
      margin: 20px;
      text-align: center;
    }
    .contact a, .contact span {
      display: block;
      margin: 5px 0;
      color: #333;
      font-size: 18px;
      text-decoration: none;
    }
    /* Zoom */
    .zoomed {
      position: fixed;
      top: 0; 
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      z-index: 9999;
    }
    .zoomed img {
      max-width: 95%;
      max-height: 95%;
    }
    /* Responsive ajustes */
    @media (max-width: 1024px) {
      #catalog-container {
        flex-direction: column;
        align-items: center;
      }
      #sidebar {
        width: 90%;
        transform: translateX(0) !important;
        margin-bottom: 20px;
      }
      #flipbook {
        width: 90%;
      }
      #toggle-sidebar {
        right: 10px;
      }
    }
    @media (max-width: 768px) {
      #flipbook {
        height: 400px;
      }
      button {
        font-size: 14px;
        padding: 8px 16px;
      }
      input.page-input {
        width: 50px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1>Catálogo "Caballero" - Huella Digital</h1>

  <div id="catalog-container">
  <div id="sidebar">
    <h2>Categorías</h2>
    <div id="category-list">
      <button data-page="25">Adidas</button>
      <button data-page="50">Puma</button>
    </div>
  </div>
  <button id="toggle-sidebar">◀</button> <!-- ahora fuera de #sidebar -->
  <div id="flipbook"></div>
</div>

  <div class="controls">
    <button id="prev">⬅ Anterior</button>
    <button id="next">Siguiente ➡</button>
    <span class="page-info">Página: <span id="current-page">1</span> / 186</span>
    <input class="page-input" type="number" min="1" max="186" placeholder="Ir a página">
    <button id="go-page">Ir</button>
  </div>

  <div class="contact">
    <span>📱 WhatsApp: +52 775 192 6952</span>
    <a href="https://www.facebook.com/marketplace/profile/61556632927258/" target="_blank">📘 Facebook</a>
  </div>

  <script>
    const totalPages = 186; 
    const flipbook = $("#flipbook");

    for (let i = 1; i <= totalPages; i++) {
      const num = String(i).padStart(3, "0");
      flipbook.append(`<div class="page"><img src="cat1/pagina_${num}.jpg" alt="Página ${i}"></div>`);
    }

    flipbook.turn({
      width: 900,
      height: 600,
      autoCenter: true,
      display: 'double'
    });

    $("#prev").click(() => flipbook.turn("previous"));
    $("#next").click(() => flipbook.turn("next"));

    $(document).on("click", "#flipbook .page img", function () {
      const src = $(this).attr("src");
      $("body").append(`<div class="zoomed"><img src="${src}"></div>`);
    });

    $(document).on("click", ".zoomed", function () {
      $(this).remove();
    });

    flipbook.bind("turned", function(event, page) {
      $("#current-page").text(page);
    });

    $("#go-page").click(function() {
      const page = parseInt($(".page-input").val());
      if (!isNaN(page) && page >= 1 && page <= totalPages) {
        flipbook.turn("page", page);
      }
      $(".page-input").val("");
    });

    $("#sidebar button[data-page]").click(function() {
      const page = parseInt($(this).attr("data-page"));
      flipbook.turn("page", page);
    });

    // Desplegable completo de la barra lateral
    $("#toggle-sidebar").click(function() {
    $("#sidebar").toggleClass("collapsed");
    $(this).text($("#sidebar").hasClass("collapsed") ? "▶" : "◀");
  });
  </script>
</body>
</html>
