<style>
  /* Barra lateral */
  #sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 220px;
    height: 100%;
    background: #222;
    color: white;
    padding: 20px;
    overflow-y: auto;
    z-index: 10000;
  }
  #sidebar h2 {
    margin-top: 0;
    font-size: 20px;
    cursor: pointer;
  }
  #sidebar ul {
    list-style: none;
    padding: 0;
    display: none;
  }
  #sidebar ul li {
    margin: 10px 0;
  }
  #sidebar ul li button {
    width: 100%;
    text-align: left;
    background: #333;
  }
  #sidebar ul li button:hover {
    background: #555;
  }
  /* Flipbook con margen izquierdo */
  #flipbook {
    margin-left: 240px; /* espacio para la barra lateral */
  }
  /* Paginador */
  .paginator {
    margin: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .paginator input {
    width: 50px;
    padding: 5px;
    font-size: 16px;
  }
</style>

<body>
  <!-- Barra lateral -->
  <div id="sidebar">
    <h2 id="toggle-cats">Categorías ▾</h2>
    <ul id="categories">
      <li><button data-page="25">Adidas</button></li>
      <li><button data-page="50">Puma</button></li>
      <!-- Puedes añadir más aquí -->
    </ul>
  </div>

  <h1>Catálogo de Zapatos</h1>

  <div id="flipbook"></div>

  <div class="controls">
    <button id="prev">⬅ Anterior</button>
    <button id="next">Siguiente ➡</button>
  </div>

  <!-- Paginador -->
  <div class="paginator">
    Página: <span id="currentPage">1</span> / <span id="totalPages">186</span>
    <input type="number" id="gotoPage" min="1" max="186">
    <button id="goBtn">Ir</button>
  </div>

  <div class="contact">
    <span>📱 WhatsApp: +52 775 192 6952</span>
    <a href="https://www.facebook.com/marketplace/profile/61556632927258/" target="_blank">📘 Facebook</a>
  </div>

  <script>
    const totalPages = 186; 
    const flipbook = $("#flipbook");

    // Generar páginas automáticamente
    for (let i = 1; i <= totalPages; i++) {
      const num = String(i).padStart(3, "0");
      flipbook.append(`<div class="page"><img src="cat1/pagina_${num}.jpg" alt="Página ${i}"></div>`);
    }

    // Inicializar flipbook
    flipbook.turn({
      width: 900,
      height: 600,
      autoCenter: true,
      display: 'double',
      when: {
        turned: function(e, page) {
          $("#currentPage").text(page);
        }
      }
    });

    // Botones de navegación
    $("#prev").click(() => flipbook.turn("previous"));
    $("#next").click(() => flipbook.turn("next"));

    // Zoom al hacer clic en una página
    $(document).on("click", "#flipbook .page img", function () {
      const src = $(this).attr("src");
      $("body").append(`<div class="zoomed"><img src="${src}"></div>`);
    });

    // Salir del zoom
    $(document).on("click", ".zoomed", function () {
      $(this).remove();
    });

    // Toggle de categorías
    $("#toggle-cats").click(() => {
      $("#categories").slideToggle();
    });

    // Botones de categorías
    $("#categories button").click(function() {
      const page = parseInt($(this).data("page"));
      flipbook.turn("page", page);
    });

    // Paginador manual
    $("#goBtn").click(() => {
      let page = parseInt($("#gotoPage").val());
      if(page >= 1 && page <= totalPages){
        flipbook.turn("page", page);
      }
    });
  </script>
</body>
